spring:
  application:
    name: enrollment
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
  jpa:
    hibernate:
      ddl-auto: create-drop
    defer-datasource-initialization: true
    properties:
      hibernate:
        format_sql: true
    show-sql: true

  sql:
    init:
      encoding: UTF-8
      mode: always
server:
  port: 8080
